name: Plan

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:

jobs:
  plan:
    uses: stormreply/slt-workflows/.github/workflows/plan.yaml@feat/init-tfvars-from-vars
    with:
      var_file: ${{ hashFiles('demo.tfvars') != '' && 'demo.tfvars' || '' }}
    secrets:
      INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}
      STORM_LIBRARY_FOR_TERRAFORM: ${{ secrets.STORM_LIBRARY_FOR_TERRAFORM }}
      TERRAFORM_PRIVATE_KEY: ${{ secrets.TERRAFORM_PRIVATE_KEY }}
