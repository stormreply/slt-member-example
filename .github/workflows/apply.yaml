name: Apply

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7: "GitHub Actions workflow_dispatch inputs MUST be empty"
    inputs:
      after:
        type: string
        required: true
        default: ""
      ttl:
        type: string
        required: true
        default: 1 day

jobs:
  apply:
    uses: stormreply/storm-library-for-terraform/.github/workflows/apply.yaml@main
    with:
      after: ${{ inputs.after }}
      ttl: ${{ inputs.ttl }}
    secrets: inherit
